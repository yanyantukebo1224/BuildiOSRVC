name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show SDKs
        run: xcodebuild -showsdks
          
      - name: Install iOS 26.0 SDK / Simulator Runtime
        run: |
          sudo xcodebuild -downloadPlatform iOS -buildVersion 26.0 || true

      - name: Install mlx-swift dependency
        run: |
          cd Demos/iOS/RVCNative
          mkdir -p Vendor
          if [ ! -f "Vendor/mlx-swift/Package.swift" ]; then
            echo "mlx-swift submodule is missing or empty. Cloning from GitHub at tag 0.21.0..."
            rm -rf Vendor/mlx-swift
            git clone --depth 1 --branch 0.21.0 https://github.com/ml-explore/mlx-swift.git Vendor/mlx-swift
            cd Vendor/mlx-swift
            git submodule update --init --recursive
          fi

      - name: Build and Test Package
        run: |
          cd Demos/iOS/RVCNative/RVCNativePackage
          swift build -v

      - name: Resolve Xcode Dependencies
        run: |
          cd Demos/iOS/RVCNative
          xcodebuild -resolvePackageDependencies -workspace RVCNative.xcworkspace -scheme RVCNative

      - name: Build iOS App (Simulator)
        run: |
          cd Demos/iOS/RVCNative
          xcodebuild build \
            -workspace RVCNative.xcworkspace \
            -scheme RVCNative \
            -destination "generic/platform=iOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
